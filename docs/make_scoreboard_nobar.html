<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000}
.stage{position:relative;width:1600px;height:960px;overflow:hidden;background:#000;font-family:'Inter',system-ui,sans-serif}

.inner{position:absolute;inset:0;padding:60px 150px 110px;display:flex;flex-direction:column;justify-content:center}
.title{text-align:center;font-size:64px;transform:scaleX(1.14);transform-origin:center;font-weight:800;letter-spacing:1px;color:#b48cf2}
.subtitle{text-align:center;font-size:26px;letter-spacing:10px;margin-top:34px;color:#8a8f98;font-weight:600}
.barwrap{margin:60px 10px 0;height:64px;position:relative;border:1px solid #3a3d45;background:#0d0e11;border-radius:6px}
.fill{position:absolute;left:5px;top:5px;bottom:5px;width:78.4%;background:linear-gradient(90deg,#f7b04a,#d8571c);border-radius:3px}
.barlab{position:absolute;top:50%;transform:translateY(-50%);font-size:26px;left:24px;z-index:2;font-family:'JetBrains Mono',monospace;color:#000;font-weight:800}
.barlab.right{left:auto;right:24px;color:#e8e8e8;font-weight:700}
.hs{text-align:center;font-size:37px;letter-spacing:12px;margin-top:72px;color:#f2f2f2;font-weight:800}
table{width:100%;margin-top:84px;border-collapse:collapse}
td{font-size:30px;padding:27px 0;letter-spacing:2px;font-weight:700}
td.rank{width:270px;font-family:'JetBrains Mono',monospace}
td.score{text-align:right;width:330px;font-family:'JetBrains Mono',monospace;font-size:36px}
.hdr td{color:#69dbff;font-weight:600}
.r1 td{color:#5df06a}
.r2 td{color:#f4d63a}
.r3 td{color:#4aa3ff}
.r4 td{color:#ff5ec4}
.r5 td{color:#ff9a2e}
.foot{position:absolute;left:0;right:0;bottom:34px;text-align:center;font-size:15px;letter-spacing:2px;color:#6a6f78}
</style>
</head>
