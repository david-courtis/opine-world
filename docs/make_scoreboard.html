<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#0a0a0a;overflow:hidden}
.stage{position:relative;width:1600px;height:1240px;background:#000;overflow:hidden;
  font-family:'Press Start 2P','Courier New',monospace}
/* perspective grid floor */
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 38%, transparent 55%, rgba(0,0,0,0.75) 100%)}
/* CRT scanlines */
.scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg, rgba(0,0,0,0.28) 0 2px, transparent 2px 5px);
  mix-blend-mode:multiply;pointer-events:none}
.inner{position:absolute;inset:0;padding:110px 150px 0}
.title{text-align:center;font-size:78px;transform:scaleX(1.12);transform-origin:center;color:#b48cf2;letter-spacing:6px;
  text-shadow:0 0 6px rgba(180,140,242,0.9),0 0 28px rgba(180,140,242,0.55),3px 3px 0 rgba(60,30,110,0.9)}
.subtitle{text-align:center;font-size:26px;color:#e8e8e8;letter-spacing:10px;margin-top:44px;
  text-shadow:0 0 10px rgba(255,255,255,0.5)}
/* progress bar */
.barwrap{margin:78px 10px 0;border:3px solid #e8e8e8;height:64px;position:relative;
  box-shadow:0 0 14px rgba(255,255,255,0.25), inset 0 0 14px rgba(255,255,255,0.08)}
.fill{position:absolute;left:5px;top:5px;bottom:5px;width:78.4%;
  background:linear-gradient(90deg,#f7b04a 0%,#e2560e 100%);
  box-shadow:0 0 18px rgba(255,140,30,0.7)}
.barlab{position:absolute;top:50%;transform:translateY(-50%);font-size:26px;color:#111;
  left:24px;text-shadow:none;z-index:2}
.barlab.right{left:auto;right:24px;color:#e8e8e8;text-shadow:0 0 8px rgba(255,255,255,0.6)}
.hs{text-align:center;font-size:37px;color:#ece6f8;letter-spacing:12px;margin-top:96px;
  text-shadow:0 0 10px rgba(236,230,248,0.7),0 0 30px rgba(180,140,242,0.35)}
table{width:100%;margin-top:110px;border-collapse:collapse}
td{font-size:30px;padding:26px 0;letter-spacing:2px}
td.rank{width:270px}
td.score{text-align:right;width:330px}
.hdr td{color:#69dbff;text-shadow:0 0 8px rgba(105,219,255,0.8),0 0 24px rgba(105,219,255,0.4)}
.r1 td{color:#5df06a;text-shadow:0 0 8px rgba(93,240,106,0.85),0 0 26px rgba(93,240,106,0.45)}
.r2 td{color:#f4d63a;text-shadow:0 0 8px rgba(244,214,58,0.85),0 0 26px rgba(244,214,58,0.45)}
.r3 td{color:#4aa3ff;text-shadow:0 0 8px rgba(74,163,255,0.85),0 0 26px rgba(74,163,255,0.45)}
.r4 td{color:#ff5ec4;text-shadow:0 0 8px rgba(255,94,196,0.85),0 0 26px rgba(255,94,196,0.45)}
.r5 td{color:#ff9a2e;text-shadow:0 0 8px rgba(255,154,46,0.85),0 0 26px rgba(255,154,46,0.45)}
.foot{margin-top:64px;text-align:center;font-size:15px;color:#9a9a9a;text-shadow:0 0 6px rgba(255,255,255,0.35);letter-spacing:2px}
</style>
</head>
<body>
